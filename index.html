<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الأنمي والألعاب</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
}

header {
  text-align: center;
  padding: 40px;
  background: #111;
  box-shadow: 0 0 20px purple;
}

header h1 {
  color: #ff00ff;
  margin: 0;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #222;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #ff00ff;
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.card h3 {
  text-align: center;
  padding: 10px;
}

.btn {
  display: block;
  text-align: center;
  padding: 10px;
  background: #ff00ff;
  color: white;
  text-decoration: none;
}

/* رسالة بداية */
#msg {
  text-align: center;
  padding: 10px;
  color: #aaa;
}
</style>
</head>

  <div class="card">
