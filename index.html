<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الألعاب والأنمي</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url("https://images.unsplash.com/photo-1604079628040-94301bb21b91") no-repeat center center fixed;
  background-size: cover;
}

/* طبقة تغميق فوق الخلفية */
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.75);
  z-index:-1;
}

/* الهيدر */
.header {
  text-align: center;
  padding: 30px;
  font-size: 30px;
  font-weight: bold;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
}

/* زر كبير */
.big-btn {
  display: block;
  margin: 20px auto;
  width: 85%;
  padding: 18px;
  background: linear-gradient(45deg, #ff0000, #ff9800);
  text-align: center;
  border-radius: 15px;
  font-size: 20px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  transition: 0.3s;
}

.big-btn:hover {
  transform: scale(1.05);
}

/* الشبكة */
.section {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/* الكروت */
.box {
  border-radius: 15px;
  overflow: hidden;
  position: relative;
  height: 220px;
  display: flex;
  align-items: flex-end;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

.box:hover {
  transform: scale(1.05);
}

/* طبقة سوداء */
.box::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
}

/* النص داخل الكرت */
.box-content {
  position: relative;
  padding: 15px;
  z-index: 2;
}

/* خلفيات لكل كرت */
.anime {
  background: url("https://images.unsplash.com/photo-1627856014754-290b58f1f1d0") center/cover;
}

.pubg {
  background: url("https://images.unsplash.com/photo-1606813907291-d86efa9b94db") center/cover;
}

.ff {
  background: url("https://images.unsplash.com/photo-1612287230202-1ff1d85d1b8b") center/cover;
}

.naruto {
  background: url("https://images.unsplash.com/photo-1531259683007-016a7b628fc3") center/cover;
}

.iphone {
  background: url("https://images.unsplash.com/photo-1511707171634-5f897ff02aa9") center/cover;
}

/* فوتر */
.footer {
  text-align: center;
  padding: 15px;
  opacity: 0.7;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">🔥 بوابة الألعاب والأنمي 🔥</div>

<a href="#" class="big-btn">🔥 اضغط هنا للدخول 🔥</a>

<div class="section">

<div class="box anime">
  <div class="box-content">
    <h2>🎬 أنمي كينجدوم</h2>
    <p>تحليل + شخصيات + أحداث قوية</p>
  </div>
</div>

<div class="box pubg">
  <div class="box-content">
    <h2>🎮 ببجي موبايل</h2>
    <p>أفضل إعدادات + أسرار الاحتراف</p>
  </div>
</div>

<div class="box ff">
  <div class="box-content">
    <h2>🔥 فري فاير</h2>
    <p>نصائح الفوز وأفضل الأسلحة</p>
  </div>
</div>

<div class="box naruto">
  <div class="box-content">
    <h2>⚔️ Naruto Storm 4</h2>
    <p>أفضل الشخصيات والحركات</p>
  </div>
</div>

<div class="box iphone">
  <div class="box-content">
    <h2>📱 iPhone 17</h2>
    <p>المواصفات والتسريبات</p>
  </div>
</div>

</div>

<div class="footer">© 2026 جميع الحقوق محفوظة</div>

</body>
</html>
