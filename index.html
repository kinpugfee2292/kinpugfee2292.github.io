<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الألعاب والأنمي</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  text-align: center;
  padding: 25px;
  font-size: 28px;
  background: black;
  font-weight: bold;
}

.section {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.box {
  background: #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
}

.box img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.box-content {
  padding: 15px;
}

.box a {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #00bcd4;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  font-weight: bold;
}

.footer {
  text-align: center;
  padding: 15px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="header">
🔥 بوابة الألعاب والأنمي 🔥
</div>

<div class="section">

<div class="box">
<img src="https://images.unsplash.com/photo-1608889175155-3d9f1c9c7b8f">
<div class="box-content">
<h2>🎬 أنمي</h2>
<p>أفضل الأنميات والأحداث</p>
<a href="#">الدخول</a>
</div>
</div>

<div class="box">
<img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
<div class="box-content">
<h2>🎮 ألعاب</h2>
<p>أسرار وإعدادات احترافية</p>
<a href="#">الدخول</a>
</div>
</div>

</div>

<div class="footer">
© 2026 جميع الحقوق محفوظة
</div>
